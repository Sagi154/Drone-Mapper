# Runs the same Linux + vcpkg pipeline as Dockerfile (configure, build, unit tests).
name: CI

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  docker-build-test:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build CI image (configure, build, ctest)
        run: docker build --progress=plain -t drone-mapper-ci:latest .
